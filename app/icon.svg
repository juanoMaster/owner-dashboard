<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0d1a12"/>

  <!-- Circuit lines extending left from head -->
  <line x1="6" y1="13" x2="2" y2="13" stroke="#1a3a1a" stroke-width="1"/>
  <line x1="6" y1="17" x2="2" y2="17" stroke="#1a3a1a" stroke-width="1"/>
  <line x1="6" y1="20" x2="2" y2="20" stroke="#1a3a1a" stroke-width="1"/>
  <line x1="2" y1="13" x2="2" y2="20" stroke="#1a3a1a" stroke-width="1"/>
  <circle cx="2" cy="13" r="1.2" fill="#3a7838"/>
  <circle cx="2" cy="20" r="1.2" fill="#3a7838"/>

  <!-- Eagle head silhouette — geometric, facing right -->
  <!-- Crown/top of head -->
  <polygon points="10,5 12,3 14,5 16,2 18,5 15,7 12,6" fill="#090e08"/>
  <!-- Main head mass -->
  <polygon points="6,13 7,8 12,6 18,7 22,10 24,14 22,19 18,22 12,22 7,19" fill="#090e08"/>
  <!-- Beak — strong hooked shape pointing right -->
  <polygon points="22,12 30,15 28,17 22,17 20,14" fill="#090e08"/>
  <!-- Beak hook tip -->
  <polygon points="28,17 30,15 29,19" fill="#090e08"/>
  <!-- Eye socket (lighter to suggest depth) -->
  <circle cx="16" cy="14" r="4" fill="#0f1f0f"/>
  <!-- Iris -->
  <circle cx="16" cy="14" r="2.5" fill="#090e08"/>
  <!-- Eye gleam highlight -->
  <circle cx="17" cy="13" r="1" fill="#4a9a4a"/>
  <!-- Neck/base -->
  <polygon points="7,19 12,22 18,22 20,25 15,27 9,25 6,21" fill="#090e08"/>
</svg>
