<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#090e08"/>
  <!-- Hawk head profile, geometric, facing right -->
  <path d="M5 15 Q5 9 9 8 Q13 7 18 9 L22 12 Q25 14 25 17 Q25 20 22 22 Q18 24 13 23 Q8 22 5 19 Z" fill="#3a7838"/>
  <!-- Beak pointing right -->
  <polygon points="22,14 29,17 22,20" fill="#c8a830"/>
  <!-- Eye ring (dark) -->
  <circle cx="16" cy="15" r="3.2" fill="#090e08"/>
  <!-- Eye gleam -->
  <circle cx="16.5" cy="14.3" r="1.3" fill="#8ad888"/>
  <!-- Crown feather hint -->
  <path d="M11 8 L13 4 L15 8 Z" fill="#4a9a4a"/>
  <!-- Circuit lines on left of head -->
  <line x1="5" y1="14" x2="2" y2="14" stroke="#2a5828" stroke-width="1.2"/>
  <line x1="5" y1="17" x2="2" y2="17" stroke="#2a5828" stroke-width="1.2"/>
  <circle cx="2" cy="14" r="1" fill="#3a7838"/>
  <circle cx="2" cy="17" r="1" fill="#3a7838"/>
</svg>
